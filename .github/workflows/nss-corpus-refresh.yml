# One-time NSS Sbírka full-text corpus rebuild (FIR-37) -- manual trigger only.
#
# The FIR-25/FIR-33 backfill cached only the ~470-char headnote of each decision
# (the FIR-36 bug), and cached pids are never re-fetched, so the committed
# data/nss_sbirka_cache.json is still headnote-only. This workflow re-fetches the
# full ruling body for every stale (pre-fix) cached decision and commits the
# rebuilt cache. Per the CEO's Option A decision the full body is kept in git.
#
# It does NOT classify, seed, or email -- it only replaces headnote-only bodies
# with full text. Fast path: it walks the KNOWN pids in the cache (no search
# pagination) and skips classification, so it runs ~2h instead of ~5-7h while
# keeping the FIR-25 429-safe pacing.
#
# Trigger: Actions tab -> "NSS Sbírka corpus refresh (one-time)" -> Run workflow,
# or:  gh workflow run nss-corpus-refresh.yml
#
# Resumable: if the crawl is throttled/timed-out, re-run this workflow -- it
# resumes from the committed cache (already-refreshed v2 entries are skipped).

name: NSS Sbírka corpus refresh (one-time)

on:
  workflow_dispatch:
    inputs:
      request_delay_ms:
        description: 'Inter-request delay in ms (default 1200; lower is faster but risks the 429 limiter)'
        required: false
        default: ''

# Needed so the commit-back step can persist the rebuilt text cache.
permissions:
  contents: write

concurrency:
  group: nss-corpus-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Rebuild NSS full-text corpus (re-fetch bodies, no classify, no email)
        run: node scripts/nss-corpus-refresh.js
        env:
          # Optional pacing override. Blank -> the FIR-25-safe 1200ms default.
          NSS_SBIRKA_REQUEST_DELAY_MS: ${{ github.event.inputs.request_delay_ms }}
      - name: Persist rebuilt text cache
        # always(): a throttled / timed-out crawl still commits its incremental
        # cache so a re-run resumes instead of restarting the re-fetch.
        if: always()
        run: |
          git config user.name "firezard-bot"
          git config user.email "bot@firezard.local"
          git add data/   # incrementally-flushed full-text cache
          if git diff --cached --quiet; then
            echo "No corpus changes to persist."
            exit 0
          fi
          # Guard: GitHub hard-rejects any single file >100 MB at the pre-receive
          # hook, so a too-large cache would make every push fail (and the retry
          # loop below can't fix a size problem). Fail fast with a clear message
          # BEFORE committing rather than crash-looping on the push. If this trips,
          # the per-decision cap (MAX_CACHE_TEXT_CHARS) is too high for git storage
          # or the corpus must move to external/sharded storage (FIR-37).
          cache_bytes=$(wc -c < data/nss_sbirka_cache.json)
          if [ "$cache_bytes" -gt 99000000 ]; then
            echo "nss_sbirka_cache.json is ${cache_bytes} bytes (>~99 MB) -- exceeds GitHub's 100 MB file limit; refusing to commit. Lower MAX_CACHE_TEXT_CHARS or move the corpus off git." >&2
            exit 1
          fi
          git commit -m "chore(FIR-37): NSS Sbírka full-text corpus refresh $(date -u +%F)"
          # main can advance between checkout and push (the weekly digest or a
          # human push), making a plain push fail with a non-fast-forward
          # rejection. Rebase our single data commit on top of the latest main and
          # retry so the refresh run doesn't fail on a harmless race.
          for attempt in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "push rejected (attempt $attempt) -- rebasing onto origin/main and retrying"
            git pull --rebase origin main || {
              echo "rebase hit a conflict -- data state needs manual resolution" >&2
              exit 1
            }
          done
          echo "push still failing after 5 attempts" >&2
          exit 1
