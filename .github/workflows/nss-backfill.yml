# One-time NSS Sbírka history backfill (FIR-25) -- manual trigger only.
#
# The weekly digest only scans the newest ~50 NSS decisions, which rarely
# include an insolvency ruling, so NSS never seeded any history. This workflow
# walks the full Sbírka archive once, seeds every insolvency-relevant decision
# into data/seen_all.json, and commits an evidence report to output/. It does
# NOT email anyone -- it is pure seeding, safe to re-run.
#
# Trigger: Actions tab -> "NSS Sbírka backfill (one-time)" -> Run workflow,
# or:  gh workflow run nss-backfill.yml
#
# Run this ONCE. After it seeds history, the normal weekly-digest workflow
# surfaces only new NSS decisions.

name: NSS Sbírka backfill (one-time)

on:
  workflow_dispatch: {}

# Needed so the commit-back step can persist the seeded de-dupe state.
permissions:
  contents: write

concurrency:
  group: nss-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Run NSS full-archive backfill (seed history, no email)
        run: node scripts/nss-backfill.js
        env:
          # REQUIRED: enables the Claude relevance classifier. Without it the
          # backfill silently falls back to the offline keyword heuristic and
          # defeats the point of FIR-33 (classifier over full text).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Persist seeded de-dupe state, text cache + backfill report
        # always(): a throttled / timed-out crawl still commits its incremental
        # text cache so a re-run resumes instead of restarting the ~4740-page
        # crawl. (seen_all.json is only written on full completion; the cache is
        # written incrementally.)
        if: always()
        run: |
          git config user.name "firezard-bot"
          git config user.email "bot@firezard.local"
          git add data/ output/   # seen_all.json + incremental text cache + report
          if git diff --cached --quiet; then
            echo "No backfill state changes to persist."
            exit 0
          fi
          git commit -m "chore(FIR-33): NSS Sbírka backfill (classifier) $(date -u +%F)"
          # main can advance between checkout and push (the weekly digest or a
          # human push), making a plain push fail with a non-fast-forward
          # rejection. Rebase our single data commit on top of the latest main and
          # retry so the seeding run doesn't fail on a harmless race.
          for attempt in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "push rejected (attempt $attempt) -- rebasing onto origin/main and retrying"
            git pull --rebase origin main || {
              echo "rebase hit a conflict -- data state needs manual resolution" >&2
              exit 1
            }
          done
          echo "push still failing after 5 attempts" >&2
          exit 1
