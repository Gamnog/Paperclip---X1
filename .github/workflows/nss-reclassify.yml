# One-time NSS Sbírka full-text RE-CLASSIFICATION (FIR-38) -- manual trigger only.
#
# The FIR-25/FIR-33 backfill classified each decision over the FIR-36
# headnote-only body (~470 chars), so it almost certainly REJECTED decisions
# whose insolvency relevance lives in the ruling BODY -- they were never seeded
# and never surfaced. FIR-37 rebuilt the corpus with full v2 bodies. This
# workflow re-runs the classifier over each cached-but-not-yet-seen decision's
# FULL body and SEEDS the newly-relevant ones into data/seen_all.json, then
# commits the seeded state, the resume ledger, and an evidence report.
#
# It reads the committed cache -- NO NSS network fetches -- so it is fast, cheap,
# and 429-free (crawl = network-bound; this = API-bound against Anthropic Haiku).
# It does NOT email anyone: newly-found historical decisions are SEEDED only
# (marked seen). Whether any should also be surfaced in a pilot digest is a
# separate CEO product call.
#
# Trigger: Actions tab -> "NSS Sbírka re-classification (one-time)" -> Run
# workflow, or:  gh workflow run nss-reclassify.yml
#
# Resumable: if interrupted / rate-limited, re-run -- it resumes from the
# committed ledger (already-classified pids are skipped).

name: NSS Sbírka re-classification (one-time)

on:
  workflow_dispatch:
    inputs:
      delay_ms:
        description: 'Inter-classify delay in ms (default 0; raise only if Anthropic rate-limits)'
        required: false
        default: ''

# Needed so the commit-back step can persist the seeded de-dupe state + ledger.
permissions:
  contents: write

concurrency:
  group: nss-reclassify
  cancel-in-progress: false

jobs:
  reclassify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Re-classify the full-text corpus (seed newly-relevant, no email)
        run: node scripts/nss-reclassify.js
        env:
          # REQUIRED: enables the Claude relevance classifier over full bodies.
          # Without it the script refuses (the offline keyword fallback cannot
          # recover the body-relevance recall gap FIR-38 exists for).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional pacing override. Blank -> 0ms (withRetry already handles 429).
          NSS_RECLASSIFY_DELAY_MS: ${{ github.event.inputs.delay_ms }}
      - name: Persist seeded de-dupe state, resume ledger + report
        # always(): an interrupted / rate-limited run still commits its
        # incrementally-flushed ledger + seed state so a re-run resumes instead
        # of re-classifying from scratch.
        if: always()
        run: |
          git config user.name "firezard-bot"
          git config user.email "bot@firezard.local"
          git add data/ output/   # seen_all.json + reclassify ledger + report
          if git diff --cached --quiet; then
            echo "No reclassify state changes to persist."
            exit 0
          fi
          git commit -m "chore(FIR-38): NSS Sbírka full-text re-classification $(date -u +%F)"
          # main can advance between checkout and push (the weekly digest or a
          # human push), making a plain push fail with a non-fast-forward
          # rejection. Rebase our single data commit on top of the latest main
          # and retry so the run doesn't fail on a harmless race.
          for attempt in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "push rejected (attempt $attempt) -- rebasing onto origin/main and retrying"
            git pull --rebase origin main || {
              echo "rebase hit a conflict -- data state needs manual resolution" >&2
              exit 1
            }
          done
          echo "push still failing after 5 attempts" >&2
          exit 1
